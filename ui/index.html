<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI CONNECTOR HUB</title>
<style>
  /* ── Reset ──────────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Tokens ─────────────────────────────────────────────────────────── */
  :root {
    --black:   #000000;
    --white:   #FAFAF5;
    --yellow:  #FFE400;
    --red:     #FF2200;
    --blue:    #0033FF;
    --green:   #00AA00;
    --grey:    #888888;
    --border:  3px solid #000;
    --shadow:  5px 5px 0 #000;
    --font:    "Courier New", Courier, monospace;
  }

  /* ── Base ───────────────────────────────────────────────────────────── */
  html { font-size: 14px; }
  body {
    font-family: var(--font);
    background: var(--white);
    color: var(--black);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Layout ─────────────────────────────────────────────────────────── */
  .site-header {
    border-bottom: var(--border);
    background: var(--black);
    color: var(--yellow);
    padding: 0;
  }

  .header-top {
    display: flex;
    align-items: stretch;
    border-bottom: var(--border);
    border-color: #333;
  }

  .logo {
    flex: 1;
    padding: 20px 24px;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1;
    border-right: 3px solid #333;
  }
  .logo span { color: var(--white); }

  .header-meta {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 12px 20px;
    font-size: 0.75rem;
    color: #888;
    gap: 4px;
    min-width: 220px;
  }
  .header-meta strong { color: var(--yellow); }

  /* ── Scan bar ────────────────────────────────────────────────────────── */
  .scan-bar {
    display: flex;
    gap: 0;
    background: var(--black);
    padding: 16px 24px;
    align-items: stretch;
  }

  .scan-label {
    background: var(--yellow);
    color: var(--black);
    font-weight: 900;
    padding: 0 14px;
    display: flex;
    align-items: center;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 3px solid var(--yellow);
    border-right: none;
    white-space: nowrap;
  }

  #path-input {
    flex: 1;
    font-family: var(--font);
    font-size: 0.85rem;
    background: #111;
    color: var(--white);
    border: 3px solid var(--yellow);
    border-right: none;
    padding: 10px 14px;
    outline: none;
  }
  #path-input:focus { background: #1a1a0a; }
  #path-input::placeholder { color: #555; }

  #scan-btn {
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    background: var(--yellow);
    color: var(--black);
    border: 3px solid var(--yellow);
    padding: 0 28px;
    cursor: pointer;
    white-space: nowrap;
  }
  #scan-btn:hover { background: var(--white); }
  #scan-btn:active { background: var(--grey); }
  #scan-btn:disabled { background: #444; color: #666; border-color: #444; cursor: not-allowed; }

  /* ── Stats bar ───────────────────────────────────────────────────────── */
  .stats-bar {
    display: flex;
    border-bottom: var(--border);
    background: var(--white);
  }

  .stat-box {
    flex: 1;
    padding: 16px 20px;
    border-right: var(--border);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-box:last-child { border-right: none; }

  .stat-value {
    font-size: 2.2rem;
    font-weight: 900;
    line-height: 1;
  }
  .stat-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--grey);
  }

  /* ── Filter bar ──────────────────────────────────────────────────────── */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    border-bottom: var(--border);
    background: var(--white);
    overflow-x: auto;
  }

  .filter-btn {
    font-family: var(--font);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    background: var(--white);
    color: var(--black);
    border: none;
    border-right: var(--border);
    padding: 14px 20px;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .filter-btn:hover { background: var(--yellow); }
  .filter-btn.active {
    background: var(--black);
    color: var(--yellow);
  }
  .filter-btn .count {
    background: var(--yellow);
    color: var(--black);
    padding: 1px 6px;
    font-size: 0.65rem;
    font-weight: 900;
  }
  .filter-btn.active .count {
    background: var(--yellow);
    color: var(--black);
  }

  /* ── Main content ────────────────────────────────────────────────────── */
  .main {
    padding: 24px;
  }

  /* ── Tool grid ───────────────────────────────────────────────────────── */
  .tool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 0;
  }

  .tool-card {
    border: var(--border);
    margin: -1.5px; /* collapse borders */
    background: var(--white);
    display: flex;
    flex-direction: column;
    transition: none;
  }
  .tool-card:hover {
    background: var(--yellow);
    z-index: 1;
    position: relative;
    box-shadow: var(--shadow);
  }

  .card-header {
    padding: 16px 18px 12px;
    border-bottom: 2px solid var(--black);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .card-name {
    font-size: 1rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 1.2;
  }

  .card-category {
    font-size: 0.6rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 3px 8px;
    border: 2px solid var(--black);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Category color coding */
  .cat-llm    { background: var(--black); color: var(--yellow); }
  .cat-fw     { background: var(--blue);  color: var(--white); }
  .cat-vdb    { background: #7700CC;      color: var(--white); }
  .cat-dev    { background: var(--green); color: var(--white); }
  .cat-obs    { background: var(--red);   color: var(--white); }
  .cat-nc     { background: #FF6600;      color: var(--white); }

  .card-body {
    padding: 12px 18px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .signal-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 0.72rem;
    line-height: 1.3;
  }

  .signal-type {
    font-size: 0.6rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 6px;
    white-space: nowrap;
    flex-shrink: 0;
    border: 1.5px solid transparent;
  }

  /* Signal type pill colors */
  .sig-dependency  { background: var(--black); color: var(--white); }
  .sig-import      { background: var(--yellow); color: var(--black); border-color: var(--black); }
  .sig-env_var     { background: var(--red); color: var(--white); }
  .sig-config_file { background: var(--blue); color: var(--white); }
  .sig-api_call    { background: var(--green); color: var(--white); }

  .signal-detail {
    color: #333;
    word-break: break-all;
    flex: 1;
  }
  .signal-file {
    color: var(--grey);
    font-size: 0.65rem;
    word-break: break-all;
  }

  /* ── States ──────────────────────────────────────────────────────────── */
  .state-panel {
    border: var(--border);
    padding: 48px 32px;
    text-align: center;
    max-width: 640px;
    margin: 48px auto;
  }

  .state-panel .big-text {
    font-size: 3rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    line-height: 1;
    margin-bottom: 16px;
  }

  .state-panel p {
    font-size: 0.8rem;
    color: var(--grey);
    line-height: 1.6;
  }

  .blink {
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }

  /* ── Status bar ──────────────────────────────────────────────────────── */
  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    border-top: var(--border);
    background: var(--black);
    color: var(--yellow);
    font-size: 0.65rem;
    display: flex;
    align-items: center;
    padding: 0;
    z-index: 100;
    letter-spacing: 0.08em;
  }

  .status-segment {
    padding: 8px 16px;
    border-right: 1px solid #333;
    white-space: nowrap;
  }
  .status-segment.grow { flex: 1; }
  .status-ok   { color: var(--green); }
  .status-err  { color: var(--red); }
  .status-info { color: var(--yellow); }

  /* ── Mode badge ──────────────────────────────────────────────────────── */
  .mode-badge {
    background: var(--yellow);
    color: var(--black);
    font-weight: 900;
    font-size: 0.6rem;
    padding: 2px 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* ── No-results ─────────────────────────────────────────────────────── */
  .no-results {
    border: var(--border);
    padding: 32px;
    text-align: center;
    font-size: 0.8rem;
    color: var(--grey);
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ── Section heading ─────────────────────────────────────────────────── */
  .section-heading {
    font-size: 0.65rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--grey);
    padding: 10px 0 8px;
    border-bottom: 2px solid var(--black);
    margin-bottom: 0;
  }

  /* ── Error bar ───────────────────────────────────────────────────────── */
  .error-bar {
    background: var(--red);
    color: var(--white);
    border-bottom: var(--border);
    border-color: #000;
    padding: 12px 24px;
    font-size: 0.75rem;
    font-weight: 700;
    display: none;
  }
  .error-bar.visible { display: block; }

  /* padding to clear fixed status bar */
  body { padding-bottom: 36px; }

  /* ── Responsive ──────────────────────────────────────────────────────── */
  @media (max-width: 600px) {
    .logo { font-size: 1.2rem; }
    .header-meta { display: none; }
    .stat-value { font-size: 1.6rem; }
    .main { padding: 12px; }
    .tool-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header class="site-header">
  <div class="header-top">
    <div class="logo">AI <span>CONNECTOR</span> HUB</div>
    <div class="header-meta">
      <div><strong id="meta-path">—</strong></div>
      <div id="meta-time">READY</div>
      <div id="meta-mode">—</div>
    </div>
  </div>
  <div class="scan-bar">
    <div class="scan-label">SCAN PATH</div>
    <input type="text" id="path-input" placeholder="/path/to/your/repo" spellcheck="false" />
    <button id="scan-btn" onclick="doScan()">SCAN →</button>
  </div>
</header>

<!-- ── Error bar ───────────────────────────────────────────────────────── -->
<div class="error-bar" id="error-bar"></div>

<!-- ── Stats ───────────────────────────────────────────────────────────── -->
<div class="stats-bar" id="stats-bar" style="display:none">
  <div class="stat-box">
    <div class="stat-value" id="stat-tools">0</div>
    <div class="stat-label">AI Tools Detected</div>
  </div>
  <div class="stat-box">
    <div class="stat-value" id="stat-signals">0</div>
    <div class="stat-label">Total Signals</div>
  </div>
  <div class="stat-box">
    <div class="stat-value" id="stat-cats">0</div>
    <div class="stat-label">Categories</div>
  </div>
  <div class="stat-box">
    <div class="stat-value" id="stat-files">0</div>
    <div class="stat-label">Source Files Hit</div>
  </div>
</div>

<!-- ── Filters ─────────────────────────────────────────────────────────── -->
<div class="filter-bar" id="filter-bar" style="display:none">
  <!-- populated by JS -->
</div>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<main class="main" id="main">
  <div class="state-panel">
    <div class="big-text">READY<span class="blink">_</span></div>
    <p>Enter a repository path above and press SCAN.<br>
    The scanner will detect every AI model, tool, framework,<br>
    vector database, and connector in your codebase.</p>
  </div>
</main>

<!-- ── Status bar ──────────────────────────────────────────────────────── -->
<div class="status-bar">
  <div class="status-segment status-info" id="status-left">IDLE</div>
  <div class="status-segment grow" id="status-mid"></div>
  <div class="status-segment" id="status-mode"></div>
  <div class="status-segment">AI CONNECTOR HUB v1.0</div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let state = {
  tools: [],
  activeFilter: 'ALL',
  scanPath: '',
  scanning: false,
};

// ── Category config ────────────────────────────────────────────────────
const CAT_CONFIG = {
  'LLM API':       { cls: 'cat-llm',  label: 'LLM API' },
  'Framework':     { cls: 'cat-fw',   label: 'FRAMEWORK' },
  'Vector DB':     { cls: 'cat-vdb',  label: 'VECTOR DB' },
  'Dev Tool':      { cls: 'cat-dev',  label: 'DEV TOOL' },
  'Observability': { cls: 'cat-obs',  label: 'OBSERVABILITY' },
  'No-code':       { cls: 'cat-nc',   label: 'NO-CODE' },
};

const CAT_ORDER = ['LLM API', 'Framework', 'Vector DB', 'Dev Tool', 'Observability', 'No-code'];

// ── Init ───────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  setMode();
  document.getElementById('path-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doScan();
  });
  // If running via server, detect current working dir
  if (window.location.hostname !== '') {
    fetch('/api/scan?path=.')
      .then(r => r.json())
      .then(data => {
        if (data.scanned_path) {
          document.getElementById('path-input').placeholder = data.scanned_path;
        }
      })
      .catch(() => {});
  }
});

function setMode() {
  const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
  const mode = isLocal ? 'LOCAL' : 'HOSTED';
  document.getElementById('status-mode').textContent = mode;
  document.getElementById('meta-mode').innerHTML =
    `<span class="mode-badge">${mode}</span> ${window.location.hostname}:${window.location.port || 80}`;
}

// ── Scan ───────────────────────────────────────────────────────────────
async function doScan() {
  if (state.scanning) return;

  const path = document.getElementById('path-input').value.trim() ||
               document.getElementById('path-input').placeholder;

  if (!path || path.startsWith('/path/to')) {
    showError('Enter a valid directory path.');
    return;
  }

  hideError();
  state.scanning = true;
  state.activeFilter = 'ALL';

  document.getElementById('scan-btn').disabled = true;
  document.getElementById('scan-btn').textContent = 'SCANNING...';
  setStatus('SCANNING ' + path, 'info');

  renderScanning();

  try {
    const res = await fetch(`/api/scan?path=${encodeURIComponent(path)}`);
    const data = await res.json();

    if (data.error) {
      showError(data.error);
      renderEmpty();
      return;
    }

    state.tools = data.tools || [];
    state.scanPath = data.scanned_path;

    const now = new Date();
    document.getElementById('meta-path').textContent = truncatePath(data.scanned_path);
    document.getElementById('meta-time').textContent =
      `SCANNED ${now.toLocaleTimeString()}`;

    renderStats(data);
    renderFilters(data);
    renderGrid();

    setStatus(`SCAN COMPLETE — ${data.tool_count} tool(s) found`, 'ok');
  } catch (err) {
    showError('Could not connect to scanner server. Is server.py running?');
    renderEmpty();
    setStatus('ERROR', 'err');
  } finally {
    state.scanning = false;
    document.getElementById('scan-btn').disabled = false;
    document.getElementById('scan-btn').textContent = 'SCAN →';
  }
}

// ── Render helpers ─────────────────────────────────────────────────────
function renderScanning() {
  document.getElementById('main').innerHTML = `
    <div class="state-panel">
      <div class="big-text">SCANNING<span class="blink">_</span></div>
      <p>Detecting AI tools, models, frameworks, vector databases,<br>
      and connectors across your codebase...</p>
    </div>`;
  document.getElementById('stats-bar').style.display = 'none';
  document.getElementById('filter-bar').style.display = 'none';
}

function renderEmpty() {
  document.getElementById('main').innerHTML = `
    <div class="state-panel">
      <div class="big-text">NONE FOUND</div>
      <p>No AI tools detected in this directory.<br>
      Try scanning a different path.</p>
    </div>`;
}

function renderStats(data) {
  const cats = new Set((data.tools || []).map(t => t.category));
  const files = new Set(
    (data.tools || []).flatMap(t => (t.signals || []).map(s => s.file))
  );

  document.getElementById('stat-tools').textContent   = data.tool_count;
  document.getElementById('stat-signals').textContent = data.signal_count;
  document.getElementById('stat-cats').textContent    = cats.size;
  document.getElementById('stat-files').textContent   = files.size;
  document.getElementById('stats-bar').style.display = '';
}

function renderFilters(data) {
  const counts = {};
  (data.tools || []).forEach(t => {
    counts[t.category] = (counts[t.category] || 0) + 1;
  });

  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '';

  // ALL button
  const all = document.createElement('button');
  all.className = 'filter-btn active';
  all.dataset.cat = 'ALL';
  all.innerHTML = `ALL <span class="count">${data.tool_count}</span>`;
  all.onclick = () => setFilter('ALL');
  bar.appendChild(all);

  // Per-category buttons
  CAT_ORDER.forEach(cat => {
    if (!counts[cat]) return;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.cat = cat;
    const cfg = CAT_CONFIG[cat] || { label: cat.toUpperCase() };
    btn.innerHTML = `${cfg.label} <span class="count">${counts[cat]}</span>`;
    btn.onclick = () => setFilter(cat);
    bar.appendChild(btn);
  });

  bar.style.display = '';
}

function setFilter(cat) {
  state.activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === cat);
  });
  renderGrid();
}

function renderGrid() {
  const filtered = state.activeFilter === 'ALL'
    ? state.tools
    : state.tools.filter(t => t.category === state.activeFilter);

  const main = document.getElementById('main');

  if (!filtered.length) {
    main.innerHTML = '<div class="no-results">No tools in this category.</div>';
    return;
  }

  // Group by category in order
  const byCat = {};
  filtered.forEach(t => {
    (byCat[t.category] = byCat[t.category] || []).push(t);
  });

  let html = '';
  const showHeadings = state.activeFilter === 'ALL';

  CAT_ORDER.forEach(cat => {
    const tools = byCat[cat];
    if (!tools) return;

    if (showHeadings) {
      const cfg = CAT_CONFIG[cat] || { label: cat.toUpperCase() };
      html += `<div class="section-heading">${cfg.label} &mdash; ${tools.length} tool(s)</div>`;
    }
    html += `<div class="tool-grid">`;
    tools.forEach(tool => { html += renderCard(tool); });
    html += `</div>`;
  });

  // Any unlisted categories
  Object.keys(byCat).forEach(cat => {
    if (CAT_ORDER.includes(cat)) return;
    if (showHeadings) html += `<div class="section-heading">${cat.toUpperCase()}</div>`;
    html += `<div class="tool-grid">`;
    byCat[cat].forEach(tool => { html += renderCard(tool); });
    html += `</div>`;
  });

  main.innerHTML = html;
}

function renderCard(tool) {
  const cfg = CAT_CONFIG[tool.category] || { cls: '', label: tool.category.toUpperCase() };

  // Deduplicate signals
  const seenSigs = new Set();
  const signals = (tool.signals || []).filter(s => {
    const k = `${s.type}|${s.detail}|${s.file}`;
    if (seenSigs.has(k)) return false;
    seenSigs.add(k);
    return true;
  });

  const sigRows = signals.slice(0, 6).map(s => `
    <div class="signal-row">
      <span class="signal-type sig-${s.type}">${s.type.replace('_',' ')}</span>
      <span>
        <span class="signal-detail">${esc(s.detail)}</span>
        ${s.file ? `<br><span class="signal-file">${esc(s.file)}${s.line ? ':' + s.line : ''}</span>` : ''}
      </span>
    </div>`).join('');

  const more = signals.length > 6
    ? `<div class="signal-row" style="color:var(--grey);font-size:0.65rem;padding-top:4px">
        + ${signals.length - 6} more signal(s)
       </div>`
    : '';

  return `
    <div class="tool-card">
      <div class="card-header">
        <div class="card-name">${esc(tool.label)}</div>
        <div class="card-category ${cfg.cls}">${cfg.label}</div>
      </div>
      <div class="card-body">
        ${sigRows}
        ${more}
      </div>
    </div>`;
}

// ── Status / error helpers ────────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById('status-left');
  el.textContent = msg;
  el.className = `status-segment status-${type}`;
}

function showError(msg) {
  const bar = document.getElementById('error-bar');
  bar.textContent = '⚠ ' + msg;
  bar.classList.add('visible');
}

function hideError() {
  document.getElementById('error-bar').classList.remove('visible');
}

// ── Utils ─────────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function truncatePath(path) {
  if (!path) return '—';
  const parts = path.split('/');
  if (parts.length <= 4) return path;
  return '…/' + parts.slice(-3).join('/');
}
</script>
</body>
</html>
